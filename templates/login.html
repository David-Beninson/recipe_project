<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <title>Login - Recipe App</title>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🍴 Recipe App</h1>
            <h2>Log In</h2>

            <!-- Display flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <!-- Login Form -->
            <form method="post">
                <div class="form-group">
                    <label for="name">Username:</label>
                    <input type="text" id="name" name="name" placeholder="Your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <div class="password-field">
                        <input type="password" id="password" name="password" placeholder="Your password" required>
                        <button type="button" class="toggle-password" aria-label="Show password"
                            onclick="togglePasswordVisibility('password', this)">𓁹</button>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Log In</button>
            </form>

            <p class="auth-link">Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>

</html>
