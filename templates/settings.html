{% extends "base.html" %}

{% block title %}Default Preferences{% endblock %}

{% block content %}
<section class="search-container settings-container">
    <div class="search-card">
        <h1>Default Filter</h1>
        <p class="settings-description">
            Set your default dish type, and cooking time.<br> To filter automatically when
            searching or browsing for recipes.
        </p>

        <form method="post" action="{{ url_for('recipes.update_settings') }}" class="search-form">
            <div class="form-group">
                <label for="default-dish-type">Dish Type:</label>
                <select id="default-dish-type" name="default_dish_type" class="app-input">
                    <option value="">All Types</option>
                    <option value="main course" {% if user_settings.default_dish_type=='main course' %}selected{% endif
                        %}>Main Course</option>
                    <option value="side dish" {% if user_settings.default_dish_type=='side dish' %}selected{% endif %}>
                        Side Dish</option>
                    <option value="soup" {% if user_settings.default_dish_type=='soup' %}selected{% endif %}>Soup
                    </option>
                    <option value="salad" {% if user_settings.default_dish_type=='salad' %}selected{% endif %}>Salad
                    </option>
                    <option value="breakfast" {% if user_settings.default_dish_type=='breakfast' %}selected{% endif %}>
                        Breakfast</option>
                    <option value="dessert" {% if user_settings.default_dish_type=='dessert' %}selected{% endif %}>
                        Dessert</option>
                </select>
            </div>

            <div class="form-group">
                <label for="default-prep-time">Max Cooking Time:</label>
                <select id="default-prep-time" name="default_prep_time" class="app-input">
                    <option value="9999" {% if user_settings.default_prep_time==9999 or not
                        user_settings.default_prep_time %}selected{% endif %}>Any Time</option>
                    <option value="15" {% if user_settings.default_prep_time==15 %}selected{% endif %}>Up to 15 mins
                    </option>
                    <option value="30" {% if user_settings.default_prep_time==30 %}selected{% endif %}>Up to 30 mins
                    </option>
                    <option value="45" {% if user_settings.default_prep_time==45 %}selected{% endif %}>Up to 45 mins
                    </option>
                    <option value="60" {% if user_settings.default_prep_time==60 %}selected{% endif %}>Up to 60 mins
                    </option>
                </select>
            </div>

            <div class="filter-groups checkboxes">
                <div class="filter-group checkboxes">
                    <label>
                        <input type="checkbox" id="filter-vegetarian" name="vegetarian" class="filter-checkbox" {% if
                            vegetarian %}checked{% endif %}> Vegetarian
                    </label>
                    <label>
                        <input type="checkbox" id="filter-vegan" name="vegan" class="filter-checkbox" {% if vegan
                            %}checked{% endif %}> Vegan
                    </label>
                    <label>
                        <input type="checkbox" id="filter-gluten-free" name="gluten_free" class="filter-checkbox" {% if
                            gluten_free %}checked{% endif %}> Gluten Free
                    </label>
                    <label>
                        <input type="checkbox" id="filter-kosher" name="kosher" class="filter-checkbox" {% if kosher
                            %}checked{% endif %}> Kosher
                    </label>

                </div>
                <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
</section>
{% endblock %}
