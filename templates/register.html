<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <title>Sign Up - Recipe App</title>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🍴 Recipe App</h1>
            <h2>Create Account</h2>

            <!-- Display flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <!-- Registration Form -->
            <form method="post">
                <div class="form-group">
                    <label for="name">Username:</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <div class="password-field">
                        <input type="password" id="password" name="password" required>
                        <button type="button" class="toggle-password" aria-label="Show password"
                            onclick="togglePasswordVisibility('password', this)">𓁹</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm">Confirm Password:</label>
                    <div class="password-field">
                        <input type="password" id="confirm" name="confirm" required>
                        <button type="button" class="toggle-password" aria-label="Show confirmation password"
                            onclick="togglePasswordVisibility('confirm', this)">𓁹</button>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <p class="auth-link">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
        </div>
    </div>

    <script>
        // Toggle between showing and hiding password
        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            if (!input) return;

            input.type = input.type === 'password' ? 'text' : 'password';
            const isHidden = input.type === 'password';
            button.textContent = isHidden ? '𓁹' : '‿';
            button.setAttribute('aria-label', isHidden ? 'Show password' : 'Hide password');
        }
    </script>
</body>

</html>
