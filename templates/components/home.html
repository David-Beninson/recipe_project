{% from 'components/recipe.html' import render_recipes, mock_recipes %}

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
  <title>Home - Recipe App</title>
</head>

<body>
  <nav id="main-nav">
    <div class="nav-links">
      <span>Welcome, {{ username }}!</span>
      <a href="{{ url_for('logout') }}">Log out</a>
    </div>
  </nav>

  <section class="main-content">
    <div class="sidebar">
      <h3>Add Recipe</h3>
      <form id="add-recipe-form">
        <input type="text" id="title" placeholder="Recipe name" required><br>
        <textarea id="ingredients" placeholder="Ingredients..." rows="4"></textarea><br>
        <textarea id="instructions" placeholder="Instructions..." rows="4"></textarea><br>
        <button type="submit">Add Recipe</button>
      </form>
    </div>

    <div class="recipes">
      <div id="recipe-list">
        {{ render_recipes(recipes=user_recipes) }}
      </div>
    </div>
  </section>
</body>

</html>
