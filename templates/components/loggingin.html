<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
  <title>Login - Recipe App</title>
</head>

<body>
  <div class="input-group">
    <h3>Log In</h3>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}
    <form id="bubble" method="post">
      <label for="name">Username:</label><br>
      <input type="text" id="name" name="name" required><br><br>

      <label for="password">Password:</label><br>
      <div class="password-field__wrapper">
        <!-- Eye icon to toggle password visibility -->
        <input type="password" id="password" name="password" required>
        <button type="button" class="toggle-password" aria-label="Show password"
          onclick="togglePasswordVisibility('password', this)">🔒︎</button>
      </div><br><br>

      <input type="submit" value="Log In">
    </form>

    <p id="link">Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
  </div>

  <script>
    // Toggle field type from password to text so user can see typed value
    function togglePasswordVisibility(inputId, button) {
      const input = document.getElementById(inputId);
      if (!input) return;

      input.type = input.type === 'password' ? 'text' : 'password';
      const isHidden = input.type === 'password';
      button.textContent = isHidden ? '🔒︎' : '🔓';
      button.setAttribute('aria-label', isHidden ? 'Show password' : 'Hide password');
    }
  </script>
</body>

</html>
