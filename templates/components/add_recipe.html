{% macro add_recipes() %}
<h3>Recipe Builder</h3>
<form id="add-recipe-form" action="{{ url_for('recipes.add_recipe') }}" method="POST">
    <!-- Recipe Title Input -->
    <input type="text" id="recipe-title" name="title" class="app-input" placeholder="Recipe name" required>

    <!-- Hidden File Input -->
    <input type="file" id="recipe-image" accept="image/*" capture="environment" style="display: none;">

    <!-- Recipe Image Input Label (Visible when no image) -->
    <label for="recipe-image" id="recipe-image-label" class="custom-file-upload">
        Upload Image / Take Photo
    </label>
    <div id="file-name-display" style="text-align: center; font-size: 13px; color: var(--text-muted); margin-top: -6px; margin-bottom: 10px;">No file chosen</div>

    <!-- Image Preview with Pencil Edit Overlay -->
    <div id="image-preview-container" style="display: none; position: relative; width: 100%; margin-bottom: 15px; text-align: center;">
        <label for="recipe-image" class="image-preview-wrapper" style="cursor: pointer; border-radius: var(--radius-md); overflow: hidden;">
            <img id="recipe-image-preview" src="" alt="Preview" style="max-width: 100%; max-height: 180px; border-radius: var(--radius-md); border: 1px solid var(--border); object-fit: cover; box-shadow: var(--shadow-sm); display: block; margin: 0 auto;">
            <div class="image-preview-overlay">
                <span style="font-size: 32px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));">✎</span>
            </div>
        </label>
    </div>

    <input type="hidden" name="ingredients" id="hidden-ingredients">
    <input type="hidden" name="instructions" id="hidden-instructions">

    <!-- Add Ingredients Form Container -->
    <div class="add-ingredients-container">
        <h4>Add Ingredients</h4>
        <input type="text" id="ing-name" class="app-input" placeholder="Name (e.g. Tomato)">
        <input type="text" id="ing-amount" class="app-input" placeholder="Amount (e.g. 2 pcs)">
        <button type="button" id="btn-add-ingredient" class="btn btn-primary">Add to Inventory</button>
    </div>

    <!-- Inventory Zone -->
    <div id="inventory-zone">
        <h4>Inventory (Drag from here)</h4>
    </div>

    <!-- Instructions Zone -->
    <h4>Instructions (Type text and drop ingredients here)</h4>
    <div id="instructions-zone" contenteditable="true"></div>

    <!-- Submit Button -->
    <button type="submit" id="btn-submit-recipe" class="btn btn-primary" disabled>Submit Recipe</button>
</form>
{% endmacro %}
